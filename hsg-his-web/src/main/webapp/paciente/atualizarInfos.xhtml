<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/paciente/layout.xhtml">

    <ui:define name="title">HSG - Atualizar Dados</ui:define>

    <ui:define name="breadcrumbItems">
        <h:outputText value="&#187;" styleClass="sep"/>
        <h:outputText value="Atualizar Dados" style="font-weight:bold;"/>
    </ui:define>

    <ui:define name="content">
        <h:form id="mainForm">

            <p:growl id="msgs" widgetVar="msgs" showDetail="true" life="6000"/>

            <p:tabView id="tabs" dynamic="false">

                <p:tab title="Dados Cadastrais e Endereço">

                    <h:panelGroup id="panelCadastral" layout="block" styleClass="panel" style="margin-bottom:20px;">
                        <h:panelGroup layout="block" styleClass="panel-title">
                            <h:outputText value="Solicitar Atualização Cadastral"/>
                        </h:panelGroup>

                        <h:panelGroup layout="block" styleClass="panel-body">

                            <h:panelGroup layout="block" styleClass="note" style="margin-bottom:16px;">
                                <h:outputText value="Informe os dados que deseja atualizar. A alteração só é efetivada após aprovação da equipe de enfermagem."/>
                            </h:panelGroup>

                            <h:panelGroup layout="block" styleClass="kv" style="row-gap:14px;">

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Primeiro Nome"/>
                                    <h:outputText value=" *" style="color:#c00;"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="primeiroNome"
                                                 value="#{atualizarDadosPacienteBean.formCadastral.primeiroNome}"
                                                 required="true"
                                                 requiredMessage="Primeiro nome é obrigatório."
                                                 maxlength="100"
                                                 styleClass="input-field"
                                                 style="width:100%;"/>
                                    <p:message for="primeiroNome" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Sobrenome"/>
                                    <h:outputText value=" *" style="color:#c00;"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="sobrenome"
                                                 value="#{atualizarDadosPacienteBean.formCadastral.sobrenome}"
                                                 required="true"
                                                 requiredMessage="Sobrenome é obrigatório."
                                                 maxlength="150"
                                                 styleClass="input-field"
                                                 style="width:100%;"/>
                                    <p:message for="sobrenome" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="E-mail"/>
                                    <h:outputText value=" *" style="color:#c00;"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="emailCad"
                                                 value="#{atualizarDadosPacienteBean.formCadastral.email}"
                                                 required="true"
                                                 requiredMessage="E-mail é obrigatório."
                                                 maxlength="255"
                                                 styleClass="input-field"
                                                 style="width:100%;"/>
                                    <p:message for="emailCad" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Telefone"/>
                                    <h:outputText value=" (somente dígitos)" styleClass="muted"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="telefoneCad"
                                                 value="#{atualizarDadosPacienteBean.formCadastral.telefone}"
                                                 maxlength="20"
                                                 styleClass="input-field mono"
                                                 style="width:100%;"
                                                 placeholder="Ex: 11987654321"/>
                                    <p:message for="telefoneCad" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Motivo"/>
                                    <h:outputText value=" (opcional)" styleClass="muted"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputTextarea id="motivoCad"
                                                     value="#{atualizarDadosPacienteBean.formCadastral.motivo}"
                                                     maxlength="500"
                                                     rows="3"
                                                     styleClass="input-field"
                                                     style="width:100%; resize:vertical;"
                                                     placeholder="Descreva brevemente o motivo da atualização..."/>
                                </h:panelGroup>

                            </h:panelGroup>

                            <h:panelGroup layout="block" style="margin-top:20px; padding-top:14px; border-top:1px solid #e4e4e4; display:flex; gap:8px; align-items:center;">
                                <p:commandButton value="Solicitar Atualização Cadastral"
                                                 action="#{atualizarDadosPacienteBean.solicitarAtualizacaoCadastral}"
                                                 process="panelCadastral"
                                                 update=":mainForm:msgs @form"
                                                 styleClass="btn primary btn-big"
                                                 icon="pi pi-send"/>
                            </h:panelGroup>

                        </h:panelGroup>
                    </h:panelGroup>

                    <h:panelGroup id="panelEndereco" layout="block" styleClass="panel" style="margin-bottom:20px;">
                        <h:panelGroup layout="block" styleClass="panel-title">
                            <h:outputText value="Solicitar Atualização de Endereço"/>
                        </h:panelGroup>

                        <h:panelGroup layout="block" styleClass="panel-body">

                            <h:panelGroup layout="block" styleClass="kv" style="row-gap:14px;">

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Logradouro"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="logradouro"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.logradouro}"
                                                 maxlength="200"
                                                 styleClass="input-field"
                                                 style="width:100%;"
                                                 placeholder="Ex: Rua das Flores"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Número"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="numero"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.numero}"
                                                 maxlength="10"
                                                 styleClass="input-field mono"
                                                 style="width:120px;"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Complemento"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="complemento"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.complemento}"
                                                 maxlength="100"
                                                 styleClass="input-field"
                                                 style="width:100%;"
                                                 placeholder="Apto, sala, bloco..."/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Bairro"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="bairro"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.bairro}"
                                                 maxlength="100"
                                                 styleClass="input-field"
                                                 style="width:100%;"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Cidade"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="cidade"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.cidade}"
                                                 maxlength="100"
                                                 styleClass="input-field"
                                                 style="width:100%;"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Estado (UF)"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="estado"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.estado}"
                                                 maxlength="2"
                                                 styleClass="input-field mono"
                                                 style="width:60px;"
                                                 placeholder="SP"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="CEP"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="cep"
                                                 value="#{atualizarDadosPacienteBean.formEndereco.cep}"
                                                 maxlength="8"
                                                 styleClass="input-field mono"
                                                 style="width:140px;"
                                                 placeholder="Somente dígitos"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Motivo"/>
                                    <h:outputText value=" (opcional)" styleClass="muted"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputTextarea id="motivoEnd"
                                                     value="#{atualizarDadosPacienteBean.formEndereco.motivo}"
                                                     maxlength="500"
                                                     rows="3"
                                                     styleClass="input-field"
                                                     style="width:100%; resize:vertical;"/>
                                </h:panelGroup>

                            </h:panelGroup>

                            <h:panelGroup layout="block" style="margin-top:20px; padding-top:14px; border-top:1px solid #e4e4e4; display:flex; gap:8px; align-items:center;">
                                <p:commandButton value="Solicitar Atualização de Endereço"
                                                 action="#{atualizarDadosPacienteBean.solicitarAtualizacaoEndereco}"
                                                 process="panelEndereco"
                                                 update=":mainForm:msgs @form"
                                                 styleClass="btn primary btn-big"
                                                 icon="pi pi-map-marker"/>
                            </h:panelGroup>

                        </h:panelGroup>
                    </h:panelGroup>

                    <h:panelGroup layout="block" styleClass="panel">
                        <h:panelGroup layout="block" styleClass="panel-title">
                            <h:outputText value="Histórico — Dados Cadastrais e Endereço"/>
                        </h:panelGroup>

                        <p:dataTable id="tabelaHistoricoCadastral"
                                     var="s"
                                     value="#{atualizarDadosPacienteBean.historicoCadastralModel}"
                                     lazy="true"
                                     styleClass="data"
                                     emptyMessage="Nenhuma solicitação registrada até o momento."
                                     paginator="true"
                                     rows="5"
                                     paginatorAlwaysVisible="false"
                                     paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                                     rowsPerPageTemplate="5,10,20">

                            <p:column headerText="Data / Hora" style="width:140px;">
                                <h:outputText value="#{s.dataCadastro}"/>
                            </p:column>

                            <p:column headerText="Tipo" style="width:110px;">
                                <h:outputText value="#{s.tipoDescricao}"/>
                            </p:column>

                            <p:column headerText="Resumo">
                                <h:outputText value="#{s.resumo}"/>
                            </p:column>

                            <p:column headerText="Status" style="width:100px;" styleClass="center-align">
                                <h:outputText value="#{s.statusDescricao}"
                                              styleClass="chip #{s.statusCssClass}"/>
                            </p:column>

                            <p:column headerText="Motivo">
                                <h:outputText value="#{s.motivo}"/>
                            </p:column>

                            <p:column headerText="Enfermeiro" style="width:150px;">
                                <h:outputText value="#{s.enfermeiro}"/>
                            </p:column>

                        </p:dataTable>

                        <h:panelGroup layout="block" styleClass="note">
                            <h:outputText value="Solicitações aprovadas refletem no cadastro após processamento pela equipe de enfermagem."/>
                        </h:panelGroup>
                    </h:panelGroup>

                </p:tab>

                <p:tab title="Dados Clínicos">

                    <h:panelGroup id="panelClinico" layout="block" styleClass="panel" style="margin-bottom:20px;">
                        <h:panelGroup layout="block" styleClass="panel-title">
                            <h:outputText value="Solicitar Atualização Clínica"/>
                        </h:panelGroup>

                        <h:panelGroup layout="block" styleClass="panel-body">

                            <h:panelGroup layout="block" styleClass="note" style="margin-bottom:16px;">
                                <h:outputText value="Informe os valores atuais de peso, altura e tipo sanguíneo. A atualização só é efetivada após aprovação da equipe de enfermagem."/>
                            </h:panelGroup>

                            <h:panelGroup layout="block" styleClass="kv" style="row-gap:14px;">

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Peso (kg)"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="peso"
                                                 value="#{atualizarDadosPacienteBean.formClinico.peso}"
                                                 styleClass="input-field mono"
                                                 style="width:140px;"
                                                 placeholder="Ex: 72.5"/>
                                    <p:message for="peso" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Altura (m)"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputText id="altura"
                                                 value="#{atualizarDadosPacienteBean.formClinico.altura}"
                                                 styleClass="input-field mono"
                                                 style="width:140px;"
                                                 placeholder="Ex: 1.75"/>
                                    <p:message for="altura" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Tipo Sanguíneo"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:selectOneMenu id="tipoSanguineo"
                                                     value="#{atualizarDadosPacienteBean.formClinico.tipoSanguineo}"
                                                     styleClass="input-field"
                                                     style="width:200px;">
                                        <f:selectItem itemLabel="Selecione..." itemValue="#{null}" noSelectionOption="true"/>
                                        <f:selectItems value="#{atualizarDadosPacienteBean.tiposSanguineos}"
                                                       var="ts"
                                                       itemLabel="#{ts.descricao}"
                                                       itemValue="#{ts.name()}"/>
                                    </p:selectOneMenu>
                                    <p:message for="tipoSanguineo" styleClass="field-error"/>
                                </h:panelGroup>

                                <h:panelGroup layout="block" styleClass="k">
                                    <h:outputText value="Motivo"/>
                                    <h:outputText value=" (opcional)" styleClass="muted"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" styleClass="v">
                                    <p:inputTextarea id="motivoClin"
                                                     value="#{atualizarDadosPacienteBean.formClinico.motivo}"
                                                     maxlength="500"
                                                     rows="3"
                                                     styleClass="input-field"
                                                     style="width:100%; resize:vertical;"/>
                                </h:panelGroup>

                            </h:panelGroup>

                            <h:panelGroup layout="block" style="margin-top:20px; padding-top:14px; border-top:1px solid #e4e4e4; display:flex; gap:8px; align-items:center;">
                                <p:commandButton value="Solicitar Atualização Clínica"
                                                 action="#{atualizarDadosPacienteBean.solicitarAtualizacaoClinica}"
                                                 process="panelClinico"
                                                 update=":mainForm:msgs @form"
                                                 styleClass="btn primary btn-big"
                                                 icon="pi pi-heart"/>
                            </h:panelGroup>

                        </h:panelGroup>
                    </h:panelGroup>

                    <h:panelGroup layout="block" styleClass="panel">
                        <h:panelGroup layout="block" styleClass="panel-title">
                            <h:outputText value="Histórico — Dados Clínicos"/>
                        </h:panelGroup>

                        <p:dataTable id="tabelaHistoricoClinico"
                                     var="s"
                                     value="#{atualizarDadosPacienteBean.historicoClinicoModel}"
                                     lazy="true"
                                     styleClass="data"
                                     emptyMessage="Nenhuma solicitação clínica registrada até o momento."
                                     paginator="true"
                                     rows="5"
                                     paginatorAlwaysVisible="false"
                                     paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                                     rowsPerPageTemplate="5,10,20">

                            <p:column headerText="Data / Hora" style="width:140px;">
                                <h:outputText value="#{s.dataCadastro}"/>
                            </p:column>

                            <p:column headerText="Resumo">
                                <h:outputText value="#{s.resumo}"/>
                            </p:column>

                            <p:column headerText="Tipo Sanguíneo" style="width:130px;" styleClass="center-align">
                                <h:outputText value="#{s.tipoSanguineoProposto}"/>
                            </p:column>

                            <p:column headerText="Status" style="width:100px;" styleClass="center-align">
                                <h:outputText value="#{s.statusDescricao}"
                                              styleClass="chip #{s.statusCssClass}"/>
                            </p:column>

                            <p:column headerText="Motivo">
                                <h:outputText value="#{s.motivo}"/>
                            </p:column>

                            <p:column headerText="Enfermeiro" style="width:150px;">
                                <h:outputText value="#{s.enfermeiro}"/>
                            </p:column>

                        </p:dataTable>

                        <h:panelGroup layout="block" styleClass="note">
                            <h:outputText value="Solicitações aprovadas refletem nos dados clínicos após processamento pela equipe de enfermagem."/>
                        </h:panelGroup>
                    </h:panelGroup>

                </p:tab>

            </p:tabView>

        </h:form>
    </ui:define>

</ui:composition>
