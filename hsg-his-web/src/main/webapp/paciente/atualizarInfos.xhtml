<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pac="http://java.sun.com/jsf/composite/paciente"
                template="/WEB-INF/templates/paciente/layout.xhtml">

    <ui:define name="title">HSG - Atualizar Dados</ui:define>

    <ui:define name="breadcrumbItems">
        <h:outputText value="&#187;" styleClass="sep"/>
        <h:outputText value="Atualizar Dados" style="font-weight:bold;"/>
    </ui:define>

    <ui:define name="content">
        <h:form id="mainForm">

            <p:growl id="msgs" widgetVar="msgs" showDetail="true" life="6000" globalOnly="true"/>

            <p:tabView id="tabs" dynamic="false" activeIndex="#{atualizarDadosPacienteBean.activeTabIndex}">

                <p:tab id="tabCadastral" title="Dados Cadastrais e Endereço">
                    <pac:form-cadastral id="formCadastral" bean="#{atualizarDadosPacienteBean}"/>
                    <pac:form-endereco  id="formEndereco"  bean="#{atualizarDadosPacienteBean}"/>
                    <ui:include src="/paciente/fragments/historico-cadastral.xhtml"/>
                </p:tab>

                <p:tab id="tabClinico" title="Dados Clínicos">
                    <pac:form-clinico id="formClinico" bean="#{atualizarDadosPacienteBean}"/>
                    <ui:include src="/paciente/fragments/historico-clinico.xhtml"/>
                </p:tab>

            </p:tabView>

            <pac:dialogo-cancelamento id="dlgCancel" bean="#{atualizarDadosPacienteBean}"/>
            <pac:dialogo-visualizacao id="dlgVisu"   bean="#{atualizarDadosPacienteBean}"/>

        </h:form>
    </ui:define>

</ui:composition>
