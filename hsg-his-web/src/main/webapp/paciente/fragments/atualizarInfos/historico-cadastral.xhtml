<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <h:panelGroup layout="block" styleClass="panel">
        <h:panelGroup layout="block" styleClass="panel-title">
            <h:outputText value="Histórico — Dados Cadastrais e Endereço"/>
        </h:panelGroup>
        <p:dataTable id="tabelaHistoricoCadastral"
                     var="s"
                     value="#{atualizarDadosPacienteBean.historicoCadastralModel}"
                     lazy="true"
                     styleClass="data"
                     emptyMessage="Nenhuma solicitação registrada até o momento."
                     paginator="true"
                     rows="5"
                     paginatorAlwaysVisible="false"
                     paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                     rowsPerPageTemplate="5,10,20">
            <p:column headerText="Data / Hora" style="width:140px;">
                <h:outputText value="#{s.dataCadastro}"/>
            </p:column>
            <p:column headerText="Tipo" style="width:110px;">
                <h:outputText value="#{s.tipoDescricao}"/>
            </p:column>
            <p:column headerText="Resumo">
                <h:outputText value="#{s.resumo}"/>
            </p:column>
            <p:column headerText="Status" style="width:100px;" styleClass="center-align">
                <h:outputText value="#{s.statusDescricao}" styleClass="chip #{s.statusCssClass}"/>
            </p:column>
            <p:column headerText="Motivo">
                <h:outputText value="#{s.motivo}"/>
            </p:column>
            <p:column headerText="Enfermeiro" style="width:150px;">
                <h:outputText value="#{s.enfermeiro}"/>
            </p:column>
            <p:column headerText="Ações" style="width:80px;" styleClass="center-align">
                <p:commandButton icon="fa fa-eye"
                                 title="Visualizar"
                                 styleClass="btn icon-btn"
                                 process="@this"
                                 action="#{atualizarDadosPacienteBean.selecionarSolicitacao(s)}"
                                 update=":mainForm:dlgVisu:body"
                                 oncomplete="if (!args.validationFailed) PF('dlgVisualizacao').show();"/>
                <p:commandButton icon="fa fa-ban"
                                 title="Cancelar"
                                 rendered="#{s.cancelavel}"
                                 styleClass="btn icon-btn danger"
                                 action="#{atualizarDadosPacienteBean.prepararCancelamento(s.id, 0)}"
                                 process="@this"
                                 update=":mainForm:dlgCancel:formCancelamento:body"
                                 oncomplete="PF('dlgCancelamento').show();"/>
            </p:column>
        </p:dataTable>
        <h:panelGroup layout="block" styleClass="note">
            <h:outputText value="Solicitações aprovadas refletem no cadastro após processamento pela equipe de enfermagem."/>
        </h:panelGroup>
    </h:panelGroup>

</ui:composition>
