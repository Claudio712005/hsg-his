<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui">

    <h:panelGroup layout="block" styleClass="panel">
        <h:panelGroup layout="block" styleClass="panel-title">
            <h:outputText value="Exames Recentes"/>
            <h:panelGroup layout="block" styleClass="tools">
                <h:panelGroup layout="block" styleClass="tool-btn" title="Minimizar">
                    <h:outputText value="&#8722;"/>
                </h:panelGroup>
            </h:panelGroup>
        </h:panelGroup>
        <p:dataTable var="exame"
                     value="#{[]}"
                     styleClass="data"
                     emptyMessage="Nenhum exame registrado disponível no momento.">
            <p:column headerText="Tipo de Exame">
                <h:outputText value="#{exame.tipoExame}"/>
            </p:column>
            <p:column headerText="Data">
                <h:outputText value="#{exame.data}"/>
            </p:column>
            <p:column headerText="Resultado" styleClass="center-align">
                <h:outputText value="#{exame.resultado}"/>
            </p:column>
            <p:column headerText="Ação" styleClass="center-align"/>
        </p:dataTable>
        <h:panelGroup layout="block" styleClass="note">
            <h:outputText value="O módulo de resultados de exames estará disponível em breve."/>
        </h:panelGroup>
    </h:panelGroup>

</ui:composition>
