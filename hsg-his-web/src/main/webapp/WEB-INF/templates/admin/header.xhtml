<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <div class="topbar">
        <div class="brand">
            <div class="logo">H</div>
            HSG&#160;-&#160;Hospital Management System
            <span class="sub">Administração&#160;|&#160;v4.12.3</span>
        </div>
        <div class="spacer"/>
        <div class="topmenu">
            <a class="item" href="#{request.contextPath}/admin/home.xhtml">Início</a>
        </div>
        <div class="user">
            <div class="avatar">
                #{beanSessao.admin != null ? beanSessao.admin.nomeCompleto.substring(0,1) : 'A'}
            </div>
            <div class="meta">
                <div class="label">Administrador</div>
                <div class="name">
                    #{beanSessao.admin != null ? beanSessao.admin.nomeCompleto : ''}
                </div>
            </div>
        </div>
        <h:form id="logoutAdminForm" styleClass="logout-form">
            <h:commandButton value="Sair"
                             action="#{adminBean.sair}"
                             styleClass="logout"/>
        </h:form>
    </div>

</ui:composition>
