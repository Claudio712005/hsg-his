<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title><ui:insert name="title">HSG - Portal do Paciente</ui:insert></title>
    <h:outputStylesheet library="css" name="paciente-portal.css"/>
    <ui:insert name="head"/>
</h:head>

<h:body>

    <ui:include src="/WEB-INF/templates/paciente/header.xhtml"/>

    <div class="shell">

        <ui:include src="/WEB-INF/templates/paciente/sidebar.xhtml"/>

        <main class="main">

            <div class="breadcrumb">
                <a href="#{request.contextPath}/paciente/home.xhtml">Início</a>
                <span class="sep">&#187;</span>
                <span>Portal do Paciente</span>
                <ui:insert name="breadcrumbItems"/>
            </div>

            <ui:insert name="content">
                <p>Conteúdo não definido.</p>
            </ui:insert>

        </main>
    </div>

    <ui:include src="/WEB-INF/templates/paciente/footer.xhtml"/>

    <h:outputScript>
        document.querySelectorAll('.menu-header').forEach(function(h) {
            h.addEventListener('click', function() {
                h.parentElement.classList.toggle('open');
            });
        });
    </h:outputScript>

</h:body>
</html>
