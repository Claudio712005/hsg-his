<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <div class="err-icon" style="color:#{corCodigo};">
        <i class="fas #{icone}"/>
    </div>

    <div class="err-code" style="color:#{corCodigo};">#{codHttp}</div>

    <div class="err-title">#{titulo}</div>
    <div class="err-msg">#{mensagem}</div>

    <div class="err-actions">

        <h:panelGroup rendered="#{erroBean.exibirBotaoHome}">
            <a href="#{erroBean.homeUrl}" class="err-btn primary">
                <i class="fas fa-home"/>
                Voltar ao Início
            </a>
        </h:panelGroup>

        <div class="err-divider" style="#{erroBean.exibirBotaoHome ? '' : 'display:none;'}"/>

        <a href="#{request.contextPath}/logout" class="err-btn secondary">
            <i class="fas fa-sign-in-alt"/>
            Ir para o Login
        </a>

    </div>

</ui:composition>
