<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:panelGroup layout="block" styleClass="panel">
        <h:panelGroup layout="block" styleClass="panel-title">
            <i class="fa fa-user-plus panel-icon"/>
            <h:outputText value="Novo Pré-cadastro"/>
        </h:panelGroup>

        <h:panelGroup layout="block" styleClass="form-grid">

            <!-- tipo de profissional -->
            <h:panelGroup layout="block" styleClass="field">
                <h:outputLabel for="tipoProfissional" value="Tipo de profissional *"/>
                <h:selectOneMenu id="tipoProfissional"
                                 value="#{preCadastroBean.form.tipoProfissional}"
                                 styleClass="input"
                                 required="true"
                                 requiredMessage="Selecione o tipo de profissional.">
                    <f:selectItem itemLabel="Selecione..." itemValue="#{null}" noSelectionOption="true"/>
                    <f:selectItems value="#{preCadastroBean.tiposProfissional}"
                                   var="tp"
                                   itemValue="#{tp}"
                                   itemLabel="#{tp.descricao}"/>
                    <f:ajax event="change" render="camposDinamicos" execute="tipoProfissional"/>
                </h:selectOneMenu>
                <h:message for="tipoProfissional" styleClass="field-error"/>
            </h:panelGroup>

            <!-- nome -->
            <h:panelGroup layout="block" styleClass="field">
                <h:outputLabel for="nome" value="Nome completo *"/>
                <h:inputText id="nome"
                             value="#{preCadastroBean.form.nome}"
                             styleClass="input"
                             maxlength="255"
                             required="true"
                             requiredMessage="Nome é obrigatório."/>
                <h:message for="nome" styleClass="field-error"/>
            </h:panelGroup>

            <!-- email -->
            <h:panelGroup layout="block" styleClass="field">
                <h:outputLabel for="email" value="E-mail *"/>
                <h:inputText id="email"
                             value="#{preCadastroBean.form.email}"
                             styleClass="input"
                             maxlength="255"
                             required="true"
                             requiredMessage="E-mail é obrigatório."/>
                <h:message for="email" styleClass="field-error"/>
            </h:panelGroup>

            <!-- cpf -->
            <h:panelGroup layout="block" styleClass="field">
                <h:outputLabel for="cpf" value="CPF *"/>
                <h:inputText id="cpf"
                             value="#{preCadastroBean.form.cpf}"
                             styleClass="input"
                             maxlength="14"
                             required="true"
                             requiredMessage="CPF é obrigatório."/>
                <h:message for="cpf" styleClass="field-error"/>
            </h:panelGroup>

        </h:panelGroup>

        <!-- campos dinâmicos por tipo -->
        <h:panelGroup id="camposDinamicos" layout="block">
            <ui:include src="campos-medico.xhtml"/>
            <ui:include src="campos-enfermeiro.xhtml"/>
        </h:panelGroup>

        <ui:include src="botoes.xhtml"/>

    </h:panelGroup>

</ui:composition>
