<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<cc:interface>
    <cc:attribute name="bean" required="true"/>
</cc:interface>

<cc:implementation>
    <p:dialog id="dialog"
              widgetVar="dlgCancelamento"
              header="Cancelar Solicitação"
              modal="true"
              resizable="false"
              width="500"
              closeOnEscape="true"
              styleClass="dialog-cancelamento">

        <!-- Always in DOM so AJAX can target it -->
        <h:panelGroup id="body" layout="block">

            <h:panelGroup layout="block" styleClass="note" style="margin-bottom:18px; color:#b00; background:#fff5f5; border:1px solid #fcc; padding:10px 14px; border-radius:4px;">
                <h:outputText value="Esta ação não pode ser desfeita. Informe o motivo antes de confirmar."/>
            </h:panelGroup>

            <h:panelGroup layout="block" styleClass="kv">
                <h:panelGroup layout="block" styleClass="k">
                    <h:outputText value="Motivo"/>
                    <h:outputText value=" *" style="color:#c00;"/>
                </h:panelGroup>
                <h:panelGroup layout="block" styleClass="v">
                    <p:inputTextarea id="motivoCancel"
                                     value="#{cc.attrs.bean.motivoCancelamento}"
                                     required="true"
                                     requiredMessage="O motivo do cancelamento é obrigatório."
                                     maxlength="500"
                                     rows="4"
                                     styleClass="input-field"
                                     style="width:100%; resize:vertical;"/>
                    <p:message for="motivoCancel" styleClass="field-error"/>
                </h:panelGroup>
            </h:panelGroup>

        </h:panelGroup>

        <f:facet name="footer">
            <p:commandButton value="Confirmar cancelamento"
                             icon="mi-icon ic-ban"
                             action="#{cc.attrs.bean.confirmarCancelamento}"
                             process="body"
                             update=":mainForm:msgs body :mainForm:tabs:tabelaHistoricoCadastral :mainForm:tabs:tabelaHistoricoClinico"
                             styleClass="btn danger"
                             oncomplete="if (!args.validationFailed) PF('dlgCancelamento').hide();"/>
            <p:commandButton value="Voltar"
                             icon="mi-icon ic-times"
                             type="button"
                             onclick="PF('dlgCancelamento').hide();"
                             styleClass="btn secondary"/>
        </f:facet>
    </p:dialog>
</cc:implementation>
</html>
