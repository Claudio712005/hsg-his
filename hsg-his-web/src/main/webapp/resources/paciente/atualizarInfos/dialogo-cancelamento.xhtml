<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<cc:interface>
    <cc:attribute name="bean" required="true"/>
</cc:interface>

<cc:implementation>
    <p:dialog id="dialog"
              widgetVar="dlgCancelamento"
              header="Cancelar Solicitação"
              modal="true"
              resizable="false"
              width="500"
              closeOnEscape="true"
              contentStyle="padding:16px;"
              styleClass="dialog-cancelamento">
        <h:form id="formCancelamento">

            <h:panelGroup id="body" layout="block" style="display:flex; flex-direction:column; gap:12px;">

                <h:panelGroup layout="block" styleClass="note"
                              style="margin-bottom:18px; color:#b00; background:#fff5f5; border:1px solid #fcc; padding:10px 14px; border-radius:4px;">
                    <h:outputText value="Esta ação não pode ser desfeita. Informe o motivo antes de confirmar."/>
                </h:panelGroup>

                <h:panelGroup layout="block" styleClass="kv" style="display:flex; flex-direction:column;">
                    <h:panelGroup layout="block" styleClass="k">
                        <h:outputText value="Motivo"/>
                        <h:outputText value=" *" style="color:#c00;"/>
                    </h:panelGroup>
                    <h:panelGroup layout="block" styleClass="v">
                        <p:inputTextarea id="motivoCancel"
                                         value="#{cc.attrs.bean.motivoCancelamento}"
                                         required="true"
                                         requiredMessage="O motivo do cancelamento é obrigatório."
                                         maxlength="500"
                                         rows="4"
                                         autoResize="false"
                                         styleClass="input-field"
                                         style="width:100%; min-height:130px; resize:vertical;"/>
                        <p:message for="motivoCancel" styleClass="field-error"/>
                    </h:panelGroup>
                </h:panelGroup>

            </h:panelGroup>

            <h:panelGroup layout="block"
                          styleClass="dialog-footer"
                          style="display:flex; justify-content:flex-end; gap:8px; padding-top:12px; border-top:1px solid #e5e7eb; margin-top:12px;">
                <p:commandButton value="Confirmar cancelamento"
                                 icon="fa fa-ban"
                                 action="#{cc.attrs.bean.confirmarCancelamento}"
                                 process="@form"
                                 update=":mainForm:msgs :mainForm:tabs"
                                 styleClass="btn danger"
                                 oncomplete="if (!args.validationFailed) PF('dlgCancelamento').hide();"/>
                <p:commandButton value="Voltar"
                                 icon="fa fa-times"
                                 type="button"
                                 onclick="PF('dlgCancelamento').hide();"
                                 styleClass="btn secondary"/>
            </h:panelGroup>
        </h:form>
    </p:dialog>
</cc:implementation>
</html>
