<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<cc:interface>
    <cc:attribute name="bean" required="true"/>
</cc:interface>

<cc:implementation>
    <h:panelGroup layout="block" styleClass="panel">
        <h:panelGroup layout="block" styleClass="panel-title">
            <h:outputText value="Últimas Medições"/>
            <h:panelGroup layout="block" styleClass="tools">
                <h:panelGroup layout="block" styleClass="tool-btn" title="Minimizar">
                    <h:outputText value="&#8722;"/>
                </h:panelGroup>
            </h:panelGroup>
        </h:panelGroup>

        <p:outputPanel rendered="#{cc.attrs.bean.ultimaMedicao != null}">
            <h:panelGroup layout="block" styleClass="panel-body">
                <h:panelGroup layout="block" styleClass="fin-box">
                    <h:panelGroup layout="block">
                        <h:panelGroup layout="block" styleClass="lbl"><h:outputText value="Peso"/></h:panelGroup>
                        <h:panelGroup layout="block" styleClass="val">
                            <h:outputText value="#{cc.attrs.bean.ultimaMedicao.peso} kg"/>
                        </h:panelGroup>
                    </h:panelGroup>
                    <h:panelGroup layout="block" styleClass="sep-v"/>
                    <h:panelGroup layout="block">
                        <h:panelGroup layout="block" styleClass="lbl"><h:outputText value="Altura"/></h:panelGroup>
                        <h:panelGroup layout="block" styleClass="val">
                            <h:outputText value="#{cc.attrs.bean.ultimaMedicao.altura} m"/>
                        </h:panelGroup>
                    </h:panelGroup>
                    <h:panelGroup layout="block" styleClass="sep-v"/>
                    <h:panelGroup layout="block">
                        <h:panelGroup layout="block" styleClass="lbl"><h:outputText value="Data da Medição"/></h:panelGroup>
                        <h:panelGroup layout="block" styleClass="val" style="font-size:12px;">
                            <h:outputText value="#{cc.attrs.bean.ultimaMedicaoFormatada}"/>
                        </h:panelGroup>
                    </h:panelGroup>
                </h:panelGroup>
            </h:panelGroup>
        </p:outputPanel>

        <p:outputPanel rendered="#{cc.attrs.bean.ultimaMedicao == null}">
            <h:panelGroup layout="block" styleClass="empty-state">
                <h:panelGroup layout="block" styleClass="empty-icon">
                    <h:outputText value="&#9678;"/>
                </h:panelGroup>
                <h:outputText value="Nenhuma medição registrada no sistema."/>
            </h:panelGroup>
        </p:outputPanel>

        <h:panelGroup layout="block" styleClass="note">
            <h:outputText value="Medições clínicas registradas pela equipe de enfermagem."/>
        </h:panelGroup>
    </h:panelGroup>
</cc:implementation>
</html>
